<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GCash Payment - MotoTyre</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #007dfe 0%, #0057b8 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; border-radius: 16px; padding: 2rem; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .logo { text-align: center; margin-bottom: 1.5rem; }
    .logo-text { font-size: 2.5rem; font-weight: 700; color: #007dfe; }
    .logo-sub { font-size: 1.2rem; color: #007dfe; font-weight: 600; }
    .amount-box { background: #f5f7fa; border-radius: 12px; padding: 1.25rem; text-align: center; margin-bottom: 1.5rem; }
    .amount-label { font-size: 0.85rem; color: #666; margin-bottom: 0.25rem; }
    .amount-value { font-size: 2rem; font-weight: 700; color: #222; }
    .merchant { font-size: 0.9rem; color: #666; text-align: center; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #333; margin-bottom: 0.4rem; }
    .form-group input { width: 100%; padding: 0.75rem 1rem; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; transition: border-color 0.2s; }
    .form-group input:focus { outline: none; border-color: #007dfe; }
    .btn { width: 100%; padding: 0.9rem; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-bottom: 0.75rem; display: block; text-align: center; text-decoration: none; }
    .btn-primary { background: #007dfe; color: #fff; }
    .btn-primary:hover { background: #0066cc; }
    .btn-cancel { background: #f5f5f5; color: #666; }
    .btn-cancel:hover { background: #e0e0e0; }
    .demo-note { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 0.75rem; margin-bottom: 1.5rem; font-size: 0.8rem; color: #856404; text-align: center; }
    #otp-section { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-text">G</div>
      <div class="logo-sub">GCash</div>
    </div>
    
    <div class="demo-note">
      ⚠️ <strong>DEMO MODE</strong> - No real money will be charged
    </div>
    
    <div class="amount-box">
      <div class="amount-label">Amount to Pay</div>
      <div class="amount-value">₱{{ "%.2f"|format(amount|float) }}</div>
    </div>
    
    <div class="merchant">
      Paying to: <strong>MotoTyre North Caloocan</strong><br>
      Order #{{ "%03d"|format(order.id) if order else "000" }}
    </div>
    
    <!-- PHONE SECTION -->
    <div id="phone-section">
      <div class="form-group">
        <label>GCash Mobile Number</label>
        <input type="tel" id="phone" placeholder="09XX XXX XXXX" value="09171234567">
      </div>
      <button type="button" class="btn btn-primary" id="btn-next">Next</button>
      <a href="{{ url_for('payment_failed', order_id=order.id if order else '') }}" class="btn btn-cancel">Cancel</a>
    </div>
    
    <!-- OTP SECTION -->
    <div id="otp-section">
      <div class="form-group">
        <label>Enter 6-digit OTP</label>
        <input type="text" id="otp" placeholder="123456" maxlength="6" value="123456">
      </div>
      <p style="font-size:0.8rem;color:#666;margin-bottom:1rem;text-align:center;">OTP sent to 0917****567</p>
      <a href="{{ url_for('payment_success', order_id=order.id if order else '') }}" class="btn btn-primary">Pay ₱{{ "%.2f"|format(amount|float) }}</a>
      <button type="button" class="btn btn-cancel" id="btn-back">Back</button>
    </div>
  </div>
  
  <script>
    document.getElementById('btn-next').addEventListener('click', function() {
      document.getElementById('phone-section').style.display = 'none';
      document.getElementById('otp-section').style.display = 'block';
    });
    
    document.getElementById('btn-back').addEventListener('click', function() {
      document.getElementById('phone-section').style.display = 'block';
      document.getElementById('otp-section').style.display = 'none';
    });
  </script>
</body>
</html>
