<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Portal – Mototyre</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

    :root {
      --bg:        #d6d3ce;
      --bg-subtle: #f5f4f2;
      --bg-card:   #ffffff;
      --fg-1:      #1c1814;
      --fg-2:      #5a544d;
      --fg-3:      #908980;
      --line-1:    #ebe9e4;
      --line-2:    #ddd9d3;
      --red:       #d00019;
      --red-soft:  rgba(208,0,25,0.08);
      --red-border:rgba(208,0,25,0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    /* ── BACKGROUND ── */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: var(--bg);
    }
    .bg-layer::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--line-1) 1px, transparent 1px),
        linear-gradient(90deg, var(--line-1) 1px, transparent 1px);
      background-size: 56px 56px;
      opacity: 0.6;
    }
    .bg-layer::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(208,0,25,0.05) 0%, transparent 70%);
    }

    /* ── CARD ── */
    .login-card {
      position: relative;
      z-index: 10;
      background: var(--bg-card);
      border: 1px solid var(--line-2);
      border-radius: 20px;
      width: 100%;
      max-width: 440px;
      padding: 3rem 2.75rem 2.5rem;
      box-shadow: 0 6px 24px rgba(28,24,20,0.35), 0 2px 6px rgba(28,24,20,0.15);
      animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    /* ── PANEL SYSTEM ── */
    .panel { display: none; }
    .panel.active { display: block; animation: fadeUp 0.3s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── LOGO ── */
    .logo-area { text-align: center; margin-bottom: 1.75rem; }
    .logo-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.06em;
      color: var(--fg-1);
      line-height: 1;
    }
    .logo-name span { color: var(--red); }
    .logo-subtitle {
      font-family: 'Syne', sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--fg-3);
      margin-top: 0.3rem;
    }

    /* ── DIVIDER ── */
    .logo-divider {
      width: 32px; height: 2px;
      background: var(--red);
      margin: 0.75rem auto 0;
      border-radius: 2px;
    }

    /* ── TITLE ── */
    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.04em;
      color: var(--fg-1);
      line-height: 1;
      margin-bottom: 0.35rem;
      text-align: center;
    }
    .card-sub {
      font-size: 0.83rem;
      color: var(--fg-3);
      text-align: center;
      margin-bottom: 1.75rem;
    }

    /* ── FLASH MESSAGES ── */
    .flash {
      padding: 0.65rem 0.9rem;
      border-radius: 8px;
      font-size: 0.82rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
    }
    .flash-danger  { background: rgba(208,0,25,0.08);  border: 1px solid var(--red-border); color: #991b1b; }
    .flash-success { background: rgba(21,128,61,0.08); border: 1px solid rgba(21,128,61,0.25); color: #14532d; }
    .flash-info    { background: rgba(37,99,235,0.08); border: 1px solid rgba(37,99,235,0.25); color: #1e3a8a; }
    .flash-warning { background: rgba(180,83,9,0.08);  border: 1px solid rgba(180,83,9,0.25);  color: #92400e; }

    /* ── FIELDS ── */
    .field { margin-bottom: 1rem; }
    .field label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--fg-2);
      margin-bottom: 0.4rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute;
      left: 0.9rem; top: 50%;
      transform: translateY(-50%);
      color: var(--fg-3);
      pointer-events: none;
      display: flex;
    }
    .field input {
      width: 100%;
      background: var(--bg-subtle);
      border: 1.5px solid var(--line-2);
      border-radius: 10px;
      padding: 0.75rem 1rem 0.75rem 2.6rem;
      color: var(--fg-1);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input::placeholder { color: var(--fg-3); }
    .field input:focus {
      border-color: var(--red);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(208,0,25,0.1);
    }

    .pass-wrap input { padding-right: 3.5rem; }
    .pass-toggle {
      position: absolute; right: 1rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--fg-3); font-size: 0.68rem;
      font-weight: 700; cursor: pointer;
      font-family: 'Syne', sans-serif;
      letter-spacing: 0.06em;
      transition: color 0.15s;
    }
    .pass-toggle:hover { color: var(--fg-1); }

    /* ── FORGOT LINK ── */
    .forgot-row { text-align: right; margin-bottom: 0.25rem; margin-top: -0.25rem; }
    .text-link {
      font-size: 0.78rem;
      color: var(--fg-3);
      text-decoration: none;
      font-family: 'DM Mono', monospace;
      transition: color 0.15s;
    }
    .text-link:hover { color: var(--red); }

    /* ── SUBMIT BUTTON ── */
    .btn-submit {
      width: 100%;
      padding: 0.875rem;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      margin-top: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: var(--red);
      color: #fff;
      transition: all 0.2s;
    }
    .btn-submit:hover {
      background: #a8001a;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(208,0,25,0.3);
    }
    .btn-submit:active { transform: translateY(0); box-shadow: none; }
    .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-submit svg { transition: transform 0.2s; }
    .btn-submit:hover:not(:disabled) svg { transform: translateX(3px); }

    /* ── OTP EMAIL TAG ── */
    .otp-email-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--red-soft);
      border: 1px solid var(--red-border);
      border-radius: 20px;
      padding: 0.3rem 0.8rem;
      font-size: 0.76rem;
      color: var(--red);
      font-family: 'DM Mono', monospace;
      margin-bottom: 1.5rem;
    }

    /* ── OTP GRID ── */
    .otp-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .otp-cell {
      width: 100%;
      height: 56px;
      background: var(--bg-subtle);
      border: 1.5px solid var(--line-2);
      border-radius: 10px;
      color: var(--fg-1);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .otp-cell::placeholder { color: var(--line-2); }
    .otp-cell:focus {
      border-color: var(--red);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(208,0,25,0.1);
    }
    .otp-cell.filled {
      border-color: var(--red-border);
      background: var(--red-soft);
    }

    .otp-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--fg-3);
      margin-top: 0.5rem;
    }
    .otp-timer { display: flex; align-items: center; gap: 0.4rem; }
    .otp-timer-count { color: var(--red); min-width: 3ch; }
    .otp-timer-count.expired { color: var(--fg-3); }

    .otp-resend {
      background: none; border: none;
      color: var(--red); font-weight: 600;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem; cursor: pointer;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      padding: 0;
    }
    .otp-resend.active { opacity: 1; pointer-events: auto; }

    .back-btn {
      display: inline-flex; align-items: center;
      gap: 0.35rem; background: none; border: none;
      color: var(--fg-3); font-size: 0.82rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; padding: 0; margin-top: 1rem;
      transition: color 0.15s;
    }
    .back-btn:hover { color: var(--fg-1); }

    /* ── CARD FOOTER ── */
    .card-footer-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 1.75rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.06em;
      color: var(--fg-3);
    }
    .footer-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--red);
      opacity: 0.6;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .login-card { padding: 2.25rem 1.5rem 2rem; margin: 1rem; }
      .otp-cell { max-width: 44px; font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<!-- Clean dark background -->
<div class="bg-layer"></div>

<!-- ── CARD ── -->
<div class="login-card">

  <!-- Logo -->
  <div class="logo-area">
    <div class="logo-mark">
      <div class="logo-name">MOTO<span>TYRE</span></div>
    </div>
  </div>

  <!-- PANEL 1: Login -->
  <div class="panel active" id="panel-login">
    <h2 class="card-title">Sign In</h2>
    <p class="card-sub">Admin access only</p>

    <div id="login-flash">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            {{ message }}
          </div>
        {% endfor %}
      {% endwith %}
    </div>

    <form method="POST" action="{{ url_for('admin_login') }}" id="login-form">
      <div class="field">
        <label>Email Address</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </span>
          <input type="email" name="email" id="login-email" placeholder="admin@mototyre.com" required autocomplete="email">
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap pass-wrap">
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" name="password" id="loginPass" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="pass-toggle" onclick="togglePass('loginPass', this)">SHOW</button>
        </div>
      </div>

      <div class="forgot-row">
        <a href="{{ url_for('admin_forgot_password') }}" class="text-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-submit">
        Login
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12,5 19,12 12,19"/>
        </svg>
      </button>
    </form>

  </div>

  <!-- PANEL 2: OTP -->
  <div class="panel" id="panel-otp">
    <h2 class="card-title">Verify Identity</h2>
    <p class="card-sub">Enter the 6-digit code sent to</p>
    <div style="text-align:center;">
    <div class="otp-email-tag">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
      <span id="otp-email-display">—</span>
    </div>
    </div>

    <div id="otp-flash"></div>

    <form method="POST" action="{{ url_for('admin_verify_otp') }}" id="otp-form">
      <input type="hidden" name="otp" id="otp-hidden">
      <div class="otp-grid" id="otp-grid">
        <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" placeholder="·" autocomplete="off">
        <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" placeholder="·" autocomplete="off">
        <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" placeholder="·" autocomplete="off">
        <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" placeholder="·" autocomplete="off">
        <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" placeholder="·" autocomplete="off">
        <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" placeholder="·" autocomplete="off">
      </div>

      <button type="submit" class="btn-submit" id="otp-submit" disabled>
        Verify &amp; Enter
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20,6 9,17 4,12"/>
        </svg>
      </button>
    </form>

    <div class="otp-footer">
      <div class="otp-timer">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/>
        </svg>
        Expires in <span class="otp-timer-count" id="timer">2:00</span>
      </div>
      <button class="otp-resend" id="resend-btn" onclick="resendOtp()">Resend code</button>
    </div>

    <div style="text-align:center;">
      <button class="back-btn" onclick="switchPanel('login')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15,18 9,12 15,6"/>
        </svg>
        Back to login
      </button>
    </div>
  </div>

  <!-- Footer -->
  <div class="card-footer-row">
    <div class="footer-dot"></div>
    MOTOTYRE ADMIN © 2025
    <div class="footer-dot"></div>
    SECURED
  </div>

</div>

<script>
  // ── Panel switching ──────────────────────────────────
  function switchPanel(name) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    if (name === 'otp') { startTimer(); setTimeout(() => cells[0].focus(), 100); }
    if (name === 'login') clearInterval(timerInterval);
  }

  // Auto-show OTP panel if session has pending email
  {% if session.get('admin_pending_login_email') %}
  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('otp-email-display').textContent = '{{ session.get("admin_pending_login_email") }}';
    switchPanel('otp');
  });
  {% endif %}

  document.getElementById('login-form').addEventListener('submit', function() {
    const email = document.getElementById('login-email').value;
    document.getElementById('otp-email-display').textContent = email;
  });

  // ── OTP Cells ────────────────────────────────────────
  const cells     = document.querySelectorAll('.otp-cell');
  const otpHidden = document.getElementById('otp-hidden');
  const otpSubmit = document.getElementById('otp-submit');

  cells.forEach((cell, i) => {
    cell.addEventListener('input', (e) => {
      cell.value = e.target.value.replace(/\D/g, '');
      cell.classList.toggle('filled', cell.value !== '');
      if (cell.value && i < cells.length - 1) cells[i + 1].focus();
      syncOtp();
    });
    cell.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !cell.value && i > 0) {
        cells[i - 1].value = '';
        cells[i - 1].classList.remove('filled');
        cells[i - 1].focus();
        syncOtp();
      }
    });
    cell.addEventListener('paste', (e) => {
      e.preventDefault();
      const pasted = (e.clipboardData || window.clipboardData)
        .getData('text').replace(/\D/g, '').slice(0, 6);
      pasted.split('').forEach((ch, j) => {
        if (cells[j]) { cells[j].value = ch; cells[j].classList.add('filled'); }
      });
      cells[Math.min(pasted.length, cells.length - 1)].focus();
      syncOtp();
    });
  });

  function syncOtp() {
    otpHidden.value = [...cells].map(c => c.value).join('');
    otpSubmit.disabled = otpHidden.value.length < 6;
  }

  // ── Timer ────────────────────────────────────────────
  let timerInterval, seconds = 120;
  const timerEl  = document.getElementById('timer');
  const resendEl = document.getElementById('resend-btn');

  function startTimer() {
    seconds = 120;
    timerEl.classList.remove('expired');
    resendEl.classList.remove('active');
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      seconds--;
      if (seconds <= 0) {
        clearInterval(timerInterval);
        timerEl.textContent = '0:00';
        timerEl.classList.add('expired');
        resendEl.classList.add('active');
        otpSubmit.disabled = true;
        return;
      }
      const m = Math.floor(seconds / 60);
      const s = String(seconds % 60).padStart(2, '0');
      timerEl.textContent = `${m}:${s}`;
      if (seconds <= 120) resendEl.classList.add('active');
    }, 1000);
  }

  function resendOtp() {
    fetch("{{ url_for('admin_resend_otp') }}")
      .then(() => {
        startTimer();
        cells.forEach(c => { c.value = ''; c.classList.remove('filled'); });
        syncOtp();
        const flash = document.getElementById('otp-flash');
        flash.innerHTML = '<div class="flash flash-info"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>A new code has been sent.</div>';
        setTimeout(() => flash.innerHTML = '', 4000);
        cells[0].focus();
      });
  }

  // ── Password toggle ──────────────────────────────────
  function togglePass(id, btn) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
    btn.textContent = el.type === 'password' ? 'SHOW' : 'HIDE';
  }
</script>
</body>
</html>
