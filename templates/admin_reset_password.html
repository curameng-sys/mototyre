<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password – Mototyre Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@1,800&family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root { --ink: #0c0d0f; --red: #ff0f0f; --muted: #6b7280; --card: #111215; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--ink);
      overflow: hidden;
    }

    .bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 70% 55% at 50% 50%, rgba(255,15,15,0.07) 0%, transparent 65%), var(--ink);
    }
    .bg-layer::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .login-card {
      position: relative; z-index: 10;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      width: 100%; max-width: 440px;
      padding: 3rem 2.75rem 2.5rem;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
      animation: cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo-area { text-align: center; margin-bottom: 1.75rem; }
    .logo-mark { display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .logo-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--red); display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { color: #fff; }
    .logo-name { font-family: 'Barlow Condensed', sans-serif; font-style: italic; font-weight: 800; font-size: 1.75rem; letter-spacing: 0.04em; color: #fff; }
    .logo-name span { color: var(--red); }

    .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.1rem; letter-spacing: 0.04em; color: #fff; line-height: 1; margin-bottom: 0.35rem; text-align: center; }
    .card-sub { font-size: 0.85rem; color: var(--muted); text-align: center; margin-bottom: 1.75rem; }

    .flash { padding: 0.65rem 0.9rem; border-radius: 8px; font-size: 0.82rem; margin-bottom: 1rem; display: flex; align-items: flex-start; gap: 0.5rem; }
    .flash-danger  { background: rgba(255,15,15,0.1);  border: 1px solid rgba(255,15,15,0.25);  color: #ff6b6b; }
    .flash-success { background: rgba(22,163,74,0.1);  border: 1px solid rgba(22,163,74,0.25);  color: #4ade80; }

    .field { margin-bottom: 1rem; }
    .field label { display: flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; font-weight: 600; color: #9ca3af; margin-bottom: 0.4rem; letter-spacing: 0.02em; }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%); color: #4b5563; pointer-events: none; display: flex; }
    .field input { width: 100%; background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 0.75rem 3.5rem 0.75rem 2.6rem; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s, background 0.2s, box-shadow 0.2s; }
    .field input::placeholder { color: #4b5563; }
    .field input:focus { border-color: var(--red); background: rgba(255,255,255,0.08); box-shadow: 0 0 0 3px rgba(255,15,15,0.12); }

    .pass-toggle { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: #4b5563; font-size: 0.7rem; font-weight: 600; cursor: pointer; font-family: 'DM Mono', monospace; letter-spacing: 0.05em; transition: color 0.15s; }
    .pass-toggle:hover { color: #9ca3af; }

    .strength-bar { height: 3px; border-radius: 2px; margin-top: 0.4rem; background: rgba(255,255,255,0.08); overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0%; }
    .strength-label { font-size: 0.7rem; font-family: 'DM Mono', monospace; color: var(--muted); margin-top: 0.25rem; }

    .btn-submit { width: 100%; padding: 0.875rem; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 1rem; letter-spacing: 0.04em; cursor: pointer; margin-top: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; background: var(--red); color: #fff; transition: all 0.2s; }
    .btn-submit:hover { background: #c73418; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,15,15,0.35); }
    .btn-submit:active { transform: translateY(0); box-shadow: none; }

    .card-footer-row { display: flex; align-items: center; justify-content: center; gap: 0.4rem; margin-top: 1.75rem; font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.06em; color: #4b5563; }
    .footer-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--red); opacity: 0.5; }

    @media (max-width: 480px) { .login-card { padding: 2.25rem 1.5rem 2rem; margin: 1rem; } }
  </style>
</head>
<body>
<div class="bg-layer"></div>

<div class="login-card">
  <div class="logo-area">
    <div class="logo-mark">
      <div class="logo-name">MOTO<span>TYRE</span></div>
    </div>
  </div>

  <h2 class="card-title">Reset Password</h2>
  <p class="card-sub">Set a new password for <strong style="color:#fff;">{{ email }}</strong></p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash flash-{{ category }}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ message }}
      </div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="{{ url_for('admin_reset_password') }}">
    <div class="field">
      <label>New Password</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input type="password" name="password" id="pw" placeholder="Min. 8 characters" required autocomplete="new-password" oninput="checkStrength(this.value)">
        <button type="button" class="pass-toggle" onclick="togglePass('pw', this)">SHOW</button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="strength-label" id="strength-label"></div>
    </div>

    <div class="field">
      <label>Confirm New Password</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input type="password" name="confirm_password" id="cpw" placeholder="Repeat password" required autocomplete="new-password">
        <button type="button" class="pass-toggle" onclick="togglePass('cpw', this)">SHOW</button>
      </div>
    </div>

    <button type="submit" class="btn-submit">
      Reset Password
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="20,6 9,17 4,12"/>
      </svg>
    </button>
  </form>

  <div class="card-footer-row">
    <div class="footer-dot"></div>
    MOTOTYRE ADMIN © 2025
    <div class="footer-dot"></div>
    SECURED
  </div>
</div>

<script>
  function togglePass(id, btn) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
    btn.textContent = el.type === 'password' ? 'SHOW' : 'HIDE';
  }

  function checkStrength(pw) {
    const fill  = document.getElementById('strength-fill');
    const label = document.getElementById('strength-label');
    let score = 0;
    if (pw.length >= 8)  score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;

    const levels = [
      { pct: '0%',   color: 'transparent', text: '' },
      { pct: '25%',  color: '#ef4444',     text: 'Weak' },
      { pct: '50%',  color: '#f97316',     text: 'Fair' },
      { pct: '75%',  color: '#eab308',     text: 'Good' },
      { pct: '100%', color: '#22c55e',     text: 'Strong' },
    ];
    const lvl = levels[score];
    fill.style.width     = lvl.pct;
    fill.style.background = lvl.color;
    label.textContent    = lvl.text;
    label.style.color    = lvl.color;
  }
</script>
</body>
</html>
